name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t portfolio:ci .

      - name: Start container
        run: docker run -d --name portfolio -p 3000:3000 portfolio:ci

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Run endpoint tests
        run: |
          docker cp test/. portfolio:/app/test
          docker exec portfolio node test/endpoints.mjs

      - name: Stop container
        if: always()
        run: docker rm -f portfolio

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
